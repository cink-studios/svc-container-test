name: "Capture Dependabot OIDC Token"
on:
  pull_request_target:
    types: [opened, synchronize, reopened]

permissions:
  id-token: write
  contents: read
  pull-requests: read

jobs:
  capture-token:
    runs-on: ubuntu-latest
    if: github.actor == 'dependabot[bot]'
    steps:
      - name: Get OIDC Token
        uses: actions/github-script@v7
        with:
          script: |
            const token = await core.getIDToken();
            const parts = token.split(".");
            const payload = JSON.parse(Buffer.from(parts[1], "base64url").toString());
            console.log("=== DEPENDABOT TRIGGERED OIDC TOKEN ===");
            console.log("sub:", payload.sub);
            console.log("repository:", payload.repository);
            console.log("repository_owner:", payload.repository_owner);
            console.log("actor:", payload.actor);
            console.log("event_name:", payload.event_name);
            console.log("=== FULL CLAIMS ===");
            console.log(JSON.stringify(payload, null, 2));
